<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>완료</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center" style="max-width:500px">
  {% if already %}
    <div class="display-1 mb-3">⚠️</div>
    <h2>이미 제출했습니다!</h2>
    <p class="text-muted">중복 제출은 저장되지 않습니다.</p>
    <a href="/result/{{ lesson.id }}/" class="btn btn-outline-primary mt-2">내 피드백 확인/수정</a>
  {% elif is_edit %}
    <div class="display-1 mb-3">✏️</div>
    <h2>수정 완료!</h2>
    <p class="text-muted">{{ lesson.title }} 피드백이 수정되었습니다.</p>
  {% else %}
    <div class="display-1 mb-3">✅</div>
    <h2>제출 완료!</h2>
    <p class="text-muted">{{ lesson.title }} 피드백이 저장되었습니다.</p>
    <a href="/result/{{ lesson.id }}/" class="btn btn-outline-secondary mt-2">내 피드백 확인</a>
  {% endif %}
  <br>
  <a href="/" class="btn btn-outline-primary mt-2">처음으로</a>
</div>
</body>
</html>
