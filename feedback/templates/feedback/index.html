<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>제주여고 정보 수업 피드백</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:750px">
  <div class="text-center mb-4">
    <h1 class="h3">제주여고 1학년 정보 수업</h1>
    <p class="text-muted">수업 피드백 시스템 — 반을 선택하세요</p>
  </div>

  {% for class_name, class_lessons in lessons_by_class.items %}
  <div class="mb-4">
    <h5 class="fw-bold border-bottom pb-1 mb-2">{{ class_name }}</h5>
    <div class="row g-2">
      {% for lesson in class_lessons %}
      <div class="col-6 col-md-4">
        <div class="card shadow-sm h-100">
          <div class="card-body p-2 text-center">
            <div class="small fw-bold">{{ lesson.title }}</div>
            <div class="text-muted" style="font-size:11px">{{ lesson.date }}</div>
            <div class="mt-2 d-flex gap-1 justify-content-center">
              <a href="/write/{{ lesson.id }}/" class="btn btn-primary btn-sm py-0">작성</a>
              <a href="/result/{{ lesson.id }}/" class="btn btn-outline-secondary btn-sm py-0">확인</a>
            </div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</div>
</body>
</html>
