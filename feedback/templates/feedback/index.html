<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>제주여고 정보 수업 피드백</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:700px">
  <div class="text-center mb-4">
    <h1 class="h3">제주여고 1학년 정보 수업</h1>
    <p class="text-muted">수업 피드백 시스템</p>
  </div>

  {% for lesson in lessons %}
  <div class="card mb-3 shadow-sm">
    <div class="card-body d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-1">{{ lesson.title }}</h5>
        <small class="text-muted">{{ lesson.date }} | 제출: {{ lesson.records.count }}명</small>
      </div>
      <div class="d-flex gap-2">
        <a href="/write/{{ lesson.id }}/" class="btn btn-primary btn-sm">피드백 작성</a>
        <a href="/result/{{ lesson.id }}/" class="btn btn-outline-secondary btn-sm">결과 보기</a>
      </div>
    </div>
  </div>
  {% empty %}
  <div class="alert alert-info">등록된 수업이 없습니다. 관리자 화면에서 수업을 먼저 추가해주세요.</div>
  {% endfor %}

  <div class="text-center mt-3">
    <a href="/admin/feedback/lesson/add/" class="btn btn-outline-primary btn-sm">+ 수업 회차 추가 (교사용)</a>
  </div>
</div>
</body>
</html>
