<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>제출 완료</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5 text-center" style="max-width:520px">

  <div class="display-2 mb-3">🎉</div>
  <h4 class="fw-bold">제출 완료!</h4>
  <p class="text-muted mb-1">
    <strong>{{ student_name }}</strong> 학생, 수고했어요!
  </p>
  <p class="text-muted small">
    {{ quizset.title }} — 총 {{ answer_count }}개 문제 제출
  </p>

  <div class="alert alert-info mt-3 text-start">
    <strong>🤖 AI 자동 채점 중...</strong><br>
    <small>잠시 후 결과 확인 버튼을 눌러 채점 결과를 확인하세요.
    교사가 최종 확인 후 점수가 확정됩니다.</small>
  </div>

  <div class="d-grid gap-2 mt-3">
    <a href="/quiz/{{ lesson.id }}/result/?student_id={{ student_id }}"
       class="btn btn-primary py-2">결과 확인하기</a>
    <a href="/" class="btn btn-outline-secondary">메인으로</a>
  </div>

</div>
</body>
</html>
