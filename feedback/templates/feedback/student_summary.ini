<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><title>학생 전체 기록</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width:800px">
  <div class="mb-4">
    <h1 class="h4">{{ student_name }} 학생 전체 기록</h1>
    <p class="text-muted">총 {{ count }}회 피드백 | 학번: {{ student_id }}</p>
  </div>

  <!-- 과세특 초안 생성 버튼 -->
  <div class="card shadow-sm mb-4 border-primary">
    <div class="card-header bg-primary text-white fw-bold">과세특 초안 (AI 프롬프트)</div>
    <div class="card-body">
      <p class="small text-muted mb-2">아래 내용을 복사해서 ChatGPT 또는 Claude에 붙여넣으세요:</p>
      <textarea class="form-control font-monospace small" rows="10" id="prompt-box">
다음은 제주여고 1학년 {{ student_name }} 학생의 정보 수업 피드백 기록 {{ count }}회분입니다.

{% for r in records %}
=== {{ r.lesson.date }} | {{ r.lesson.title }} ===
[배운 내용 요약] {{ r.summary }}
[문제 해결 과정] {{ r.problem }}
[진로와의 연결] {{ r.career }}
[심화 학습 의지] {{ r.deeplearn }}
[동료 칭찬] {{ r.peer }}

{% endfor %}
위 기록을 바탕으로 이 학생의 수업 참여 특징, 주로 관심을 보인 분야, 문제 해결 사례를 중심으로 학교생활기록부 교과세부능력특기사항(과세특) 초안을 500자 내외로 작성해주세요.
      </textarea>
      <button class="btn btn-primary btn-sm mt-2"
              onclick="navigator.clipboard.writeText(document.getElementById('prompt-box').value)">
        클립보드에 복사
      </button>
    </div>
  </div>

  <!-- 회차별 기록 -->
  {% for r in records %}
  <div class="card mb-3 shadow-sm">
    <div class="card-header bg-white">
      <strong>{{ r.lesson.date }}</strong> | {{ r.lesson.title }}
    </div>
    <div class="card-body small">
      <p><span class="badge bg-secondary">배운 내용</span> {{ r.summary }}</p>
      <p><span class="badge bg-warning text-dark">문제 해결</span> {{ r.problem }}</p>
      <p><span class="badge bg-success">진로 연결</span> {{ r.career }}</p>
      <p><span class="badge bg-info text-dark">심화 학습</span> {{ r.deeplearn }}</p>
      <p class="mb-0"><span class="badge bg-danger">동료 칭찬</span> {{ r.peer }}</p>
    </div>
  </div>
  {% endfor %}

  <a href="/" class="btn btn-outline-secondary">처음으로</a>
</div>
</body>
</html>